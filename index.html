<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>LASS: IDW Diagram (Modernized)</title>

    <meta property="og:title" content="LASS: IDW Diagram" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://pm25.lass-net.org/GIS/IDW/" />
    <meta property="og:description" content="Inverse Distance Weighting (IDW) Diagram of Open PM2.5 Data Portal" />

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="./css/idw-main.css" />
    <link rel="stylesheet" href="./css/idw-controls.css" />
  </head>
  <body>
    <div id="app">
      <div id="map" aria-label="IDW map"></div>

      <aside id="legend-floating" class="panel panel-legend" aria-label="Color legend">
        <div id="legend" class="idw-legend"></div>
      </aside>

      <section id="display-panel" class="selected-panel" aria-live="polite"></section>

      <div id="logo-dock" class="logo-dock" aria-label="Partner links and data version"></div>

      <section id="notice-panel" class="notice-panel" hidden aria-live="polite">
        <div class="notice-header-row">
          <h2 id="notice-title">Notice</h2>
          <button class="notice-close" type="button" aria-label="Close notice">×</button>
        </div>
        <p id="notice-body"></p>
      </section>

      <div id="status" class="status-pill" aria-live="polite">Initializing...</div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module" src="./js/main.js"></script>
  </body>
</html>
